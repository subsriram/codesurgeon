name: Bench

on:
  pull_request:
    branches: [main]
    paths:
      - "crates/cs-core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/bench.yml"
  workflow_dispatch:

# Benchmark scripts and baselines live in a separate repo (cs-benchmark).
# This workflow checks it out alongside the codesurgeon source so the
# token-savings example output (in this repo's target/) can be diffed
# against committed baselines (in cs-benchmark).

permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  indexing:
    name: Indexing bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Don't fail the bench job if cs-benchmark isn't published yet —
      # the summary step skips when the script is missing. `continue-on-error`
      # is a step-level attribute, not a `with:` input, so it must sit
      # alongside `uses:` rather than nested under it.
      - name: Check out cs-benchmark (sibling repo with baselines + summary script)
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          repository: subsriram/cs-benchmark
          path: cs-benchmark

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-

      - name: Run indexing bench (30 samples, advisory)
        run: |
          cargo bench -p cs-core --bench indexing -- \
            --sample-size 30 \
            --warm-up-time 2 \
            --measurement-time 10 \
            --noplot

      - name: Run token savings example (20 queries, advisory)
        run: cargo run --release --example token_savings -p cs-core

      # Upload the raw criterion estimates + token-savings JSON so a baseline
      # refresh can pull exact median/mean numbers without scraping logs.
      # Regeneration recipe: trigger this workflow on `main`, download the
      # `bench-results` artifact, feed the estimates.json files into the
      # `cs-benchmark/benches/baseline.json` schema (`{median_ns, mean_ns}` per
      # benchmark name).
      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-results
          path: |
            target/criterion/**/new/estimates.json
            target/token_savings.json
          if-no-files-found: warn
          retention-days: 30

      - name: Render summary
        id: summary
        if: hashFiles('cs-benchmark/scripts/bench_summary.py') != ''
        env:
          CODESURGEON_DIR: ${{ github.workspace }}
        run: |
          python3 cs-benchmark/scripts/bench_summary.py > bench-summary.md
          cat bench-summary.md
          {
            echo 'body<<BENCHEOF'
            cat bench-summary.md
            echo 'BENCHEOF'
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.summary.outputs.body != ''
        uses: actions/github-script@v9
        env:
          SUMMARY_BODY: ${{ steps.summary.outputs.body }}
        with:
          script: |
            const body = process.env.SUMMARY_BODY;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const marker = '<!-- bench-summary -->';
            const comments = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.data.find(c => c.body && c.body.includes(marker));
            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: fullBody });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: fullBody });
            }

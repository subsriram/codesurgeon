# Linker fix for Xcode clang upgrade (clang 17 → 21).
# ort-sys hardcodes the clang/17 runtime path in its prebuilt binary;
# this points the linker at the correct clang/21 location instead.
[target.aarch64-apple-darwin]
rustflags = [
    "-L", "/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/clang/21/lib/darwin",
]
